<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 100" width="380" height="100">
  <defs>
    <!-- Gradient for PureForm text -->
    <linearGradient id="nameGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00B559" />
      <stop offset="100%" style="stop-color:#E8F5E9" />
    </linearGradient>
  </defs>
  
  <!-- Symbol: Clean H with heartbeat -->
  <g transform="10, 18">
    <!-- Main H shape -->
    <path d="M4 35 L4 2 L18 2 C26 2 30 8 30 16 C30 24 24 28 18 28 L12 28 L12 35 Z" 
          fill="#00B559"/>
    <path d="M12 2 L12 35 L16 35 L16 28 L26 28 L26 24 L16 24 L16 14 L30 14 L30 10 L16 10 L16 2 Z" 
          fill="#00B559" opacity="0.9"/>
    
    <!-- EKG heartbeat line -->
    <path d="M4 28 L8 28 L10 22 L14 34 L18 28 L30 28" 
          stroke="#00B559" 
          stroke-width="2" 
          fill="none" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
  </g>
  
  <!-- PureForm with gradient -->
  <text x="55" y="45" font-family="Arial, sans-serif" font-weight="700" font-size="42" fill="url(#nameGradient)">PureForm</text>
  
  <!-- Tagline -->
  <text x="55" y="68" font-family="Arial, sans-serif" font-weight="500" font-size="13" fill="#00B559">Natures Wellness, Without the Chemicals.</text>
</svg>