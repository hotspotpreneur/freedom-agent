<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 100" width="380" height="100">
  <defs>
    <!-- Gradient for PureForm text -->
    <linearGradient id="nameGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00B559" />
      <stop offset="100%" style="stop-color:#E8F5E9" />
    </linearGradient>
  </defs>
  
  <!-- Symbol: Exact favicon design — clean H + heartbeat -->
  <g transform="12, 25">
    <!-- Stylized H from favicon -->
    <path d="M4 6 L4 26 L7 26 L7 17 L17 17 L17 26 L20 26 L20 6 L17 6 L17 14 L7 14 L7 6 Z" 
          fill="#00B559"/>
    
    <!-- EKG Heartbeat line -->
    <path d="M7 14 L9 14 L10.5 10 L12.5 18 L14 14 L17 14" 
          stroke="#00B559" 
          stroke-width="2" 
          fill="none" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
  </g>
  
  <!-- PureForm with gradient -->
  <text x="45" y="45" font-family="Arial, sans-serif" font-weight="700" font-size="42" fill="url(#nameGradient)">PureForm</text>
  
  <!-- Tagline — ITALIC -->
  <text x="45" y="68" font-family="Arial, sans-serif" font-style="italic" font-weight="500" font-size="13" fill="#00B559">Natures Wellness, Without the Chemicals.</text>
</svg>