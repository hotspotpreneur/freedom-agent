          fill="#00B559"/>
  </g>
  
  <!-- Wordmark -->
  <text x="130" y="45" font-family="Manrope, sans-serif" font-weight="700" font-size="42" fill="#1A2B4C">PureForm</text>
  <text x="130" y="65" font-family="Manrope, sans-serif" font-weight="500" font-size="16" fill="#00B559" letter-spacing="2">WELLNESS</text>
  
  <!-- Tagline -->
  <text x="130" y="95" font-family="Inter, sans-serif" font-weight="400" font-size="14" fill="#666666">Wellness, Without the Chemicals.</text>
</svg>